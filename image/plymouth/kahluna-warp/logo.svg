<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- KahLuna WARP Gateway Logo -->
  <!-- Shield shape with network node pattern -->
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D1FF;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#7B61FF;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0E1A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#121830;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Outer shield -->
  <path d="M60 8 L105 30 L105 65 C105 85 85 105 60 115 C35 105 15 85 15 65 L15 30 Z"
        fill="url(#shieldGrad)" opacity="0.15"/>

  <!-- Shield border -->
  <path d="M60 12 L100 32 L100 63 C100 82 82 100 60 110 C38 100 20 82 20 63 L20 32 Z"
        fill="none" stroke="url(#shieldGrad)" stroke-width="1.5" opacity="0.8"/>

  <!-- Inner shield fill -->
  <path d="M60 16 L96 34 L96 62 C96 79 79 96 60 106 C41 96 24 79 24 62 L24 34 Z"
        fill="url(#innerGrad)" opacity="0.6"/>

  <!-- Network nodes -->
  <!-- Center node -->
  <circle cx="60" cy="55" r="6" fill="#00D1FF" opacity="0.9"/>
  <circle cx="60" cy="55" r="3" fill="#0A0E1A"/>

  <!-- Top node -->
  <circle cx="60" cy="32" r="4" fill="#7B61FF" opacity="0.8"/>
  <line x1="60" y1="36" x2="60" y2="49" stroke="#00D1FF" stroke-width="1" opacity="0.5"/>

  <!-- Left node -->
  <circle cx="38" cy="65" r="4" fill="#7B61FF" opacity="0.8"/>
  <line x1="42" y1="63" x2="54" y2="57" stroke="#00D1FF" stroke-width="1" opacity="0.5"/>

  <!-- Right node -->
  <circle cx="82" cy="65" r="4" fill="#7B61FF" opacity="0.8"/>
  <line x1="78" y1="63" x2="66" y2="57" stroke="#00D1FF" stroke-width="1" opacity="0.5"/>

  <!-- Bottom node -->
  <circle cx="60" cy="82" r="4" fill="#7B61FF" opacity="0.8"/>
  <line x1="60" y1="61" x2="60" y2="78" stroke="#00D1FF" stroke-width="1" opacity="0.5"/>

  <!-- Bottom-left node -->
  <circle cx="42" cy="82" r="3" fill="#00D1FF" opacity="0.5"/>
  <line x1="44" y1="80" x2="56" y2="58" stroke="#7B61FF" stroke-width="0.8" opacity="0.3"/>

  <!-- Bottom-right node -->
  <circle cx="78" cy="82" r="3" fill="#00D1FF" opacity="0.5"/>
  <line x1="76" y1="80" x2="64" y2="58" stroke="#7B61FF" stroke-width="0.8" opacity="0.3"/>
</svg>
